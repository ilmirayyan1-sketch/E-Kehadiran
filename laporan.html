<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Peratusan Semester</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <h2 class="text-center mb-4">Analitik Kehadiran Semester 1</h2>
        
        <div class="card p-4 shadow-sm">
            <h4>Rumusan Peratusan Keseluruhan</h4>
            <div class="table-responsive mt-3">
                <table class="table table-striped table-bordered text-center">
                    <thead class="table-dark">
                        <tr>
                            <th>Nama Pelajar</th>
                            <th>Jumlah Hari Hadir</th>
                            <th>Total Hari Persekolahan</th>
                            <th>Peratusan Semasa (%)</th>
                        </tr>
                    </thead>
                    <tbody id="jadualLaporan">
                        <!-- Data peratusan akan dimasukkan di sini secara automatik menggunakan JS -->
                        <tr>
                            <td>Ahmad Ali</td>
                            <td>45</td>
                            <td>50</td>
                            <td><strong class="text-success">90.00%</strong></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <div class="text-center mt-3">
            <a href="index.html" class="btn btn-primary">Kembali ke Penandaan</a>
        </div>
    </div>

</body>
</html>
