<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Kehadiran - Menu Guru</title>
    <!-- Guna Bootstrap CSS untuk reka bentuk pantas -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <h2 class="text-center mb-4">Sistem Inovasi E-Kehadiran</h2>
        
        <!-- Pilihan Kelas & Tarikh -->
        <div class="card p-4 mb-4 shadow-sm">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Pilih Tarikh</label>
                    <input type="date" id="tarikhKehadiran" class="form-control">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Pilih Kelas</label>
                    <select id="pilihKelas" class="form-select">
                        <option value="5-Sains">5 Sains</option>
                        <option value="5-Sastera">5 Sastera</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Senarai Pelajar -->
        <div class="card p-4 shadow-sm">
            <h4>Senarai Pelajar</h4>
            <hr>
            <div id="senaraiPelajar">
                <!-- Data pelajar akan masuk di sini secara dinamik menggunakan JS -->
                <div class="d-flex justify-content-between align-items-center mb-2 p-2 border-bottom">
                    <span>1. Ahmad Ali</span>
                    <div>
                        <input type="radio" class="btn-check" name="status-1" id="hadir-1" value="Hadir" checked>
                        <label class="btn btn-outline-success btn-sm" for="hadir-1">Hadir</label>

                        <input type="radio" class="btn-check" name="status-1" id="tidak-1" value="Tidak Hadir">
                        <label class="btn btn-outline-danger btn-sm" for="tidak-1">Tidak Hadir</label>
                    </div>
                </div>
            </div>
            
            <button class="btn btn-primary w-100 mt-4" onclick="simpanKehadiran()">Simpan Rekod Hari Ini</button>
        </div>
        
        <div class="text-center mt-3">
            <a href="laporan.html" class="btn btn-secondary">Lihat Peratusan Kehadiran Semester</a>
        </div>
    </div>

</body>
</html>
